<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Charcha | Secure Channel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #0f0f0f; 
            --panel: #1a1a1a; 
            --accent: #00f2ff; 
            --msg-self: #005c63; 
            --msg-other: #262626; 
        }

        body { 
            background: var(--bg); 
            color: #eee; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
        }

        /* HEADER */
        header {
            padding: 15px 20px;
            background: rgba(20,20,20,0.95);
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo { font-weight: 600; letter-spacing: 1px; color: var(--accent); }
        .exit-btn { border: 1px solid #333; background: none; color: #888; padding: 5px 15px; border-radius: 20px; cursor: pointer; }

        /* CHAT AREA */
        #chat-stream {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .msg-bubble {
            max-width: 70%;
            padding: 12px 18px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.4;
            position: relative;
            animation: popIn 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn { from{transform: scale(0.9); opacity: 0;} to{transform: scale(1); opacity: 1;} }

        .self { align-self: flex-end; background: var(--msg-self); border-bottom-right-radius: 4px; }
        .other { align-self: flex-start; background: var(--msg-other); border-bottom-left-radius: 4px; }
        
        .sender-label { font-size: 0.75rem; opacity: 0.7; margin-bottom: 5px; display: block; }
        .shared-img { max-width: 100%; border-radius: 12px; margin-top: 8px; border: 1px solid rgba(255,255,255,0.1); }

        /* INPUT SECTION */
        .input-wrapper {
            background: var(--panel);
            padding: 15px 20px;
            border-top: 1px solid #333;
            position: relative;
        }

        /* Large Image Preview */
        #preview-container {
            position: absolute;
            bottom: 80px; /* Sits above input */
            left: 20px;
            background: #222;
            padding: 10px;
            border-radius: 12px;
            border: 1px solid #444;
            display: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #preview-img { height: 150px; border-radius: 8px; display: block; }
        .remove-prev {
            position: absolute; top: -10px; right: -10px;
            background: #ff4444; color: white;
            width: 25px; height: 25px;
            border-radius: 50%;
            text-align: center; line-height: 25px;
            cursor: pointer; font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .controls { display: flex; align-items: flex-end; gap: 15px; }

        /* Animated Gallery Icon */
        .gallery-btn {
            background: none; border: none; cursor: pointer;
            color: #888; transition: 0.3s;
            padding-bottom: 8px;
        }
        .gallery-btn:hover { color: var(--accent); transform: scale(1.1); }
        .gallery-btn svg { width: 28px; height: 28px; }

        /* Text Input */
        textarea {
            flex: 1;
            background: #0f0f0f;
            border: 1px solid #333;
            color: white;
            padding: 12px 15px;
            border-radius: 25px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            resize: none;
            height: 24px; /* single line height */
            max-height: 100px;
            outline: none;
            transition: 0.3s;
        }
        textarea:focus { border-color: var(--accent); }

        /* Telegram Style Send Button */
        .send-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            color: var(--accent);
            padding-bottom: 5px;
            transition: 0.3s;
        }
        .send-btn:hover { transform: translateX(3px) scale(1.1); color: #fff; }
        .send-btn svg { width: 35px; height: 35px; fill: currentColor; }

    </style>
</head>
<body>

    <header>
        <div class="logo">SAHAJ LABS <span style="color:#666">//</span> CHARCHA</div>
        <button class="exit-btn" onclick="logout()">LOGOUT</button>
    </header>

    <div id="chat-stream">
        </div>

    <div class="input-wrapper">
        <div id="preview-container">
            <div class="remove-prev" onclick="clearAttachment()">×</div>
            <img id="preview-img" src="">
        </div>

        <div class="controls">
            <button class="gallery-btn" onclick="document.getElementById('fileIn').click()" title="Attach Image">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <circle cx="8.5" cy="8.5" r="1.5"></circle>
                    <polyline points="21 15 16 10 5 21"></polyline>
                </svg>
            </button>
            <input type="file" id="fileIn" hidden accept="image/*" onchange="handleFile(this)">

            <textarea id="msgInput" placeholder="Write a secure message..." oninput="autoResize(this)"></textarea>

            <button class="send-btn" onclick="sendMessage()">
                <svg viewBox="0 0 24 24">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                </svg>
            </button>
        </div>
    </div>

    <script>
        const ws = new WebSocket(`ws://${window.location.host}/ws/chat`);
        const username = localStorage.getItem('username');
        const token = localStorage.getItem('token');
        if(!token) window.location.href = '/auth';

        let selectedFile = null;

        function autoResize(el) {
            el.style.height = '24px';
            el.style.height = (el.scrollHeight) + 'px';
        }

        function handleFile(input) {
            if(input.files && input.files[0]) {
                selectedFile = input.files[0];
                const reader = new FileReader();
                reader.onload = e => {
                    document.getElementById('preview-img').src = e.target.result;
                    document.getElementById('preview-container').style.display = 'block';
                }
                reader.readAsDataURL(selectedFile);
            }
        }

        function clearAttachment() {
            selectedFile = null;
            document.getElementById('fileIn').value = "";
            document.getElementById('preview-container').style.display = 'none';
        }

        async function sendMessage() {
            const txt = document.getElementById('msgInput').value;
            if(!txt.trim() && !selectedFile) return;

            // Simple visual feedback
            const btn = document.querySelector('.send-btn');
            btn.style.opacity = "0.5";

            const formData = new FormData();
            formData.append("username", username);
            formData.append("message", txt);
            if(selectedFile) formData.append("file", selectedFile);

            try {
                // Secure Check (AI Utils)
                const res = await fetch("/chat-send", {
                    method: "POST", headers: { "Authorization": `Bearer ${token}` }, body: formData
                });
                const data = await res.json();

                if(data.status === "blocked") {
                    alert("⚠️ BLOCKED: " + data.reason);
                } else {
                    // Success -> WebSocket Broadcast
                    ws.send(JSON.stringify(data));
                    document.getElementById('msgInput').value = "";
                    document.getElementById('msgInput').style.height = '24px';
                    clearAttachment();
                }
            } catch(e) { console.error(e); }
            
            btn.style.opacity = "1";
        }

        ws.onmessage = e => {
            const data = JSON.parse(e.data);
            const box = document.getElementById('chat-stream');
            const isMe = data.username === username;

            const div = document.createElement('div');
            div.className = `msg-bubble ${isMe ? 'self' : 'other'}`;
            
            let html = `<span class="sender-label">${data.username}</span>`;
            if(data.image) html += `<img src="data:image/jpeg;base64,${data.image}" class="shared-img">`;
            if(data.message) html += `<div>${data.message}</div>`;
            
            div.innerHTML = html;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        };
        
        function logout() { localStorage.clear(); location.href='/auth'; }
    </script>
</body>
</html>
